<!DOCTYPE html>
<html lang="hr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nikolinino djevojačko veče</title>

<style>
body{
    margin:0;
    padding:0;
    overflow:hidden;
    font-family:Arial, sans-serif;
    background:linear-gradient(to bottom,#ffb6d9,#ffddee);
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.container{
    text-align:center;
    z-index:2;
    padding:20px;
}

h1{
    color:white;
    font-size:38px;
    margin-bottom:10px;
    text-shadow:2px 2px 8px hotpink;
}

h2{
    color:white;
    margin-bottom:20px;
}

img{
    width:240px;
    border-radius:20px;
    box-shadow:0 0 20px rgba(255,255,255,0.7);
    margin-bottom:25px;
}

button{
    background:white;
    color:hotpink;
    border:none;
    padding:15px 30px;
    border-radius:30px;
    font-size:18px;
    cursor:pointer;
    box-shadow:0 0 10px rgba(0,0,0,0.2);
    transition:0.3s;
}

button:hover{
    transform:scale(1.05);
}

.heart{
    position:absolute;
    color:white;
    font-size:25px;
    animation:fall linear infinite;
    opacity:0.8;
}

@keyframes fall{
    from{
        transform:translateY(-100px);
    }
    to{
        transform:translateY(110vh);
    }
}
</style>
</head>

<body>

<div class="container">
    <h1>Nikolinino djevojačko veče 💖</h1>
    <h2>20.6.2026 • Teslić</h2>

    <!-- OVDJE STAVI NJENU SLIKU -->
    <img src="slika.jpg" alt="Nikolina">

    <br>

    <button onclick="showMessage()">
        Klikni za slatku poruku 💌
    </button>
</div>

<script>
function showMessage(){
    alert("Vole te tvoje cure ❣️");
}

for(let i=0;i<30;i++){
    let heart=document.createElement("div");
    heart.className="heart";
    heart.innerHTML="💖";

    heart.style.left=Math.random()*100+"vw";
    heart.style.animationDuration=(3+Math.random()*5)+"s";
    heart.style.fontSize=(20+Math.random()*20)+"px";

    document.body.appendChild(heart);
}
</script>

</body>
</html>
